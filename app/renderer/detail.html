<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场控助手</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="detail-body">
    <main class="window-card detail-card">
        <div class="window-titlebar">
            <div class="title-left">
                <span class="brand-img"></span>
                <strong>场控助手</strong>
            </div>
            <div class="persona-actions" id="persona-actions" hidden>
                <button class="persona-dot gentle" data-persona="gentle" title="温柔和蔼" aria-label="温柔和蔼" type="button"></button>
                <button class="persona-dot funny" data-persona="funny" title="幽默诙谐乐子人" aria-label="幽默诙谐乐子人" type="button"></button>
                <button class="persona-dot justice" data-persona="justice" title="激进正义感爆棚" aria-label="激进正义感爆棚" type="button"></button>
            </div>
            <button class="detail-close close-icon" id="close-window" title="关闭" aria-label="关闭"></button>
        </div>

        <div class="detail-scroll" id="detail-body">
            <div class="empty-state detail-empty">点击左侧弹幕统计项查看详情</div>
        </div>
    </main>

    <div class="toast" id="toast"></div>
    <script src="./detail.js"></script>
</body>
</html>
