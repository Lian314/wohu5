<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎牙直播弹幕接收助手 - API 调试端</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(18, 26, 47, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --huya-yellow: #ffb900;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 800;
            color: var(--huya-yellow);
        }

        .api-url {
            font-size: 11px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .danmaku-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        /* 隐藏滚动条 */
        .danmaku-list::-webkit-scrollbar {
            width: 4px;
        }
        .danmaku-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .msg-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 10px;
            font-size: 13.5px;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .msg-content-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-sender {
            font-weight: 600;
            color: var(--huya-yellow);
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div>
                <h1>实时弹幕数据监测</h1>
                <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;" id="status-label">正在轮询 API 数据中...</div>
            </div>
            <span class="api-url">GET /api/danmaku</span>
        </div>

        <div id="danmaku-list" class="danmaku-list">
            <div style="text-align: center; color: var(--text-secondary); margin-top: 40px;">暂无数据，请确保后端服务已启动并连接至直播间...</div>
        </div>
    </div>

    <script>
        const PORT = 3000;
        let lastTimestamp = 0;

        async function fetchDanmaku() {
            try {
                const response = await fetch(`http://localhost:${PORT}/api/danmaku`);
                if (!response.ok) throw new Error("HTTP error");
                
                const list = await response.json();
                renderList(list);
                document.getElementById('status-label').innerText = `已连接 | 当前缓存: ${list.length} 条弹幕`;
            } catch (e) {
                document.getElementById('status-label').innerText = "无法连接至后端，请先启动 node server.js";
            }
        }

        function renderList(list) {
            const container = document.getElementById('danmaku-list');
            if (list.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); margin-top: 40px;">暂无数据，正在等待直播间弹幕...</div>`;
                return;
            }

            container.innerHTML = list.map(item => {
                const timeStr = new Date(item.timestamp).toLocaleTimeString();
                return `
                    <div class="msg-item">
                        <div class="msg-content-box">
                            <span class="msg-sender">${item.nickname}</span>
                            <span>${item.content}</span>
                        </div>
                        <span class="msg-time">${timeStr}</span>
                    </div>
                `;
            }).join('');

            // 如果有新弹幕，自动滚动到底部
            const latest = list[list.length - 1];
            if (latest && latest.timestamp > lastTimestamp) {
                lastTimestamp = latest.timestamp;
                container.scrollTop = container.scrollHeight;
            }
        }

        // 每隔 1 秒拉取一次
        setInterval(fetchDanmaku, 1000);
        fetchDanmaku();
    </script>
</body>
</html>
